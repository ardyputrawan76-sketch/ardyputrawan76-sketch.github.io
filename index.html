<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Undangan Pernikahan Ardy & Ana</title>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f7f5f0; margin: 0; text-align: center; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; background: #333; color: white; }
        .section { padding: 50px 20px; max-width: 600px; margin: auto; }
        .btn-link { display: inline-block; padding: 12px 25px; background: #25d366; color: white; text-decoration: none; border-radius: 25px; margin-top: 20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        button { padding: 12px; background: #d4af37; color: white; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Ardy & Ana</h1>
        <p>Kami mengundang Anda</p>
    </div>

    <div class="section">
        <h2>Mempelai</h2>
        <p>Ardy & Ana</p>
    </div>

    <div class="section">
        <h2>Konfirmasi Kehadiran</h2>
        <form id="rsvp-form" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="MASUKKAN_ACCESS_KEY_DISINI">
            
            <input type="text" name="Nama Tamu" id="nama-tamu" readonly>
            <select name="Kehadiran">
                <option value="Hadir">Hadir</option>
                <option value="Tidak Hadir">Tidak Hadir</option>
            </select>
            <button type="submit">Kirim Konfirmasi</button>
        </form>

        <a href="https://docs.google.com/spreadsheets/d/1GQnNhjb2Bb7oZDsktD9_Y7aeBjHUpCjlJqQwMSYegCM/edit" target="_blank" class="btn-link">
            Lihat Daftar Tamu
        </a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('nama-tamu').value = params.get('to') || "Tamu Undangan";
    </script>
</body>
</html>
