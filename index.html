<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Undangan Ardy & Ana</title>
    <style>
        body { font-family: sans-serif; background: #f7f5f0; text-align: center; margin: 0; }
        #cover { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #333; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; transition: 1s; }
        #cover.opened { transform: translateY(-100vh); }
        .btn-open { background: #d4af37; padding: 15px 30px; border-radius: 25px; border: none; cursor: pointer; color: white; }
        .container { padding: 40px 20px; max-width: 500px; margin: auto; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #d4af37; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="cover">
        <h1>Ardy & Ana</h1>
        <button class="btn-open" onclick="document.getElementById('cover').classList.add('opened')">Buka Undangan</button>
    </div>

    <div class="container">
        <div class="box">
            <h2>Konfirmasi Kehadiran</h2>
            <form id="rsvp-form" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="MASUKKAN_ACCESS_KEY_ANDA">
                <input type="text" name="Nama Tamu" id="nama" class="form-input" readonly>
                <select name="Kehadiran"><option value="Hadir">Hadir</option><option value="Tidak Hadir">Tidak Hadir</option></select>
                <button type="submit">Kirim Konfirmasi</button>
            </form>
            <div id="status" style="margin-top: 15px; font-weight: bold;"></div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('nama').value = params.get('to') || "Tamu Undangan";
        
        const form = document.getElementById('rsvp-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(form) })
            .then(res => res.json())
            .then(() => { document.getElementById('status').innerText = "✅ Terkirim!"; form.reset(); });
        });
    </script>
</body>
</html>
