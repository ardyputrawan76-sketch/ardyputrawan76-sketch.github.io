%%html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <!-- Google Fonts untuk kombinasi font elegan -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f7f5f0; /* Warna krem elegan */
            color: #333;
            overflow-x: hidden;
        }
        /* Style untuk Cover (Overlay penuh) */
        #cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1000') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            z-index: 9999;
            transition: transform 1s ease-in-out;
            padding: 20px;
        }
        /* Efek geser ke atas saat cover dibuka */
        #cover.opened {
            transform: translateY(-100vh);
        }
        .wedding-title {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #f1dfb5; /* Warna gold lembut */
        }
        .guest-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            padding: 20px 40px;
            border-radius: 8px;
            margin: 30px 0;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .guest-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 5px;
            color: #fff;
        }
        .btn-open {
            background-color: #d4af37;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .btn-open:hover {
            background-color: #aa8c2c;
            transform: scale(1.05);
        }
        /* Konten Utama setelah cover terbuka */
        #main-content {
            padding: 80px 20px;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <!-- 1. AUDIO (Ganti URL dengan link musik instrumen pilihan Anda) -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- 2. HALAMAN COVER -->
    <div id="cover">
        <p style="letter-spacing: 3px; font-size: 0.9rem;">THE WEDDING OF</p>
        <h1 class="wedding-title">Romeo & Juliet</h1>

        <div class="guest-box">
            <p style="font-size: 0.9rem; font-style: italic;">Kepada Yth. Bapak/Ibu/Saudara/i:</p>
            <!-- Nama tamu akan muncul di sini via JS -->
            <h2 id="nama-tamu" class="guest-name">Nama Tamu</h2>
        </div>

        <button class="btn-open" onclick="bukaUndangan()">Buka Undangan</button>
    </div>

    <!-- 3. KONTEN UTAMA (Akan terlihat setelah klik tombol) -->
    <div id="main-content">
        <h2 style="font-family: 'Great Vibes', cursive; font-size: 3rem; margin-bottom: 20px;">Mempelai</h2>
        <p>Di sinilah nanti Anda bisa memasukkan info detail acara, foto profil mempelai, maps, dan form ucapan.</p>
    </div>

    <!-- 4. JAVASCRIPT -->
    <script>
        // Fungsi mengambil parameter "to" dari URL
        function getGuestName() {
            const urlParams = new URLSearchParams(window.location.search);
            const guestName = urlParams.get('to');

            if (guestName) {
                // Mengubah tanda plus (+) atau %20 menjadi spasi biasa
                document.getElementById('nama-tamu').innerText = decodeURIComponent(guestName);
            } else {
                // Nama default jika di URL tidak ada parameter ?to=...
                document.getElementById('nama-tamu').innerText = "Tamu Undangan";
            }
        }

        // Fungsi saat tombol "Buka Undangan" diklik
        function bukaUndangan() {
            // 1. Geser cover ke atas
            document.getElementById('cover').classList.add('opened');

            // 2. Putar musik latar
            const music = document.getElementById('bg-music');
            music.play().catch(error => {
                console.log("Autoplay diblokir browser, musik membutuhkan interaksi user.");
            });
        }

        // Jalankan fungsi pencarian nama saat halaman dimuat
        window.onload = getGuestName;
    </script>
</body>
</html>
