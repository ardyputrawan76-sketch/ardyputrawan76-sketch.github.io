<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Ardy & Ana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #f7f5f0; color: #333; overflow-x: hidden; }

        /* Cover Style */
        #cover {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('bg-cover.jpg') no-repeat center center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; text-align: center; z-index: 9999; transition: transform 1s ease-in-out; padding: 20px;
        }
        #cover.opened { transform: translateY(-100vh); }
        .wedding-title { font-family: 'Great Vibes', cursive; font-size: 3.5rem; margin-bottom: 10px; color: #f1dfb5; }
        .guest-box { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(5px); padding: 20px 40px; border-radius: 8px; margin: 30px 0; border: 1px solid rgba(255,255,255,0.2); }
        .guest-name { font-size: 1.5rem; font-weight: 600; margin-top: 5px; color: #fff; }
        .btn-open { background-color: #d4af37; color: white; border: none; padding: 12px 28px; font-size: 1rem; font-weight: 600; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .btn-open:hover { background-color: #aa8c2c; transform: scale(1.05); }

        /* Content Style */
        #main-content { padding: 80px 20px; text-align: center; max-width: 600px; margin: 0 auto; }
        .section-salam { margin-bottom: 50px; }
        .salam-arab { font-size: 1.5rem; margin-bottom: 15px; font-weight: 500; }
        .salam-teks { font-size: 0.9rem; line-height: 1.6; color: #666; }

        /* Mempelai Style */
        .section-mempelai { display: flex; flex-direction: column; align-items: center; gap: 40px; margin-bottom: 60px; }
        @media (min-width: 768px) { .section-mempelai { flex-direction: row; justify-content: space-around; } }
        .mempelai-card { flex: 1; max-width: 280px; }
        .avatar-frame { width: 180px; height: 180px; margin: 0 auto 20px; border-radius: 50%; overflow: hidden; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .nama-lengkap { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: #aa8c2c; margin-bottom: 5px; }
        .info-ortu { font-size: 0.85rem; color: #777; line-height: 1.6; }
        .dan-simbol { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #d4af37; margin: 10px 0; }
        .pembatas { border: 0; height: 1px; background: linear-gradient(to right, transparent, #d4af37, transparent); margin: 40px 0; }

        /* Countdown Timer */
        .section-countdown { background-color: #fff; padding: 30px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 50px; }
        .timer-container { display: flex; justify-content: center; gap: 15px; }
        .timer-box { background: #f7f5f0; padding: 10px; border-radius: 8px; min-width: 70px; border: 1px solid #eadecc; }
        .timer-box span { font-size: 1.6rem; font-weight: 600; color: #333; display: block; }
        .timer-box p { font-size: 0.75rem; color: #777; text-transform: uppercase; }

        /* Detail Acara Style */
        .section-acara { background-color: #fff; padding: 35px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 50px; }
        .acara-title { font-family: 'Great Vibes', cursive; font-size: 2.5rem; color: #aa8c2c; margin-bottom: 15px; }
        .btn-maps { display: inline-block; background-color: #25d366; color: #fff; text-decoration: none; padding: 12px 25px; border-radius: 25px; font-size: 0.9rem; margin-top: 15px; transition: 0.3s; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .btn-maps:hover { background-color: #1ebd58; transform: scale(1.03); }

        /* Galeri Foto Style */
        .section-galeri { background-color: #fff; padding: 35px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 50px; }
        .galeri-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .galeri-item { width: 100%; height: 180px; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .galeri-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .galeri-item img:hover { transform: scale(1.08); }

        /* Lightbox */
        #lightbox-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); z-index: 10000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        #lightbox-overlay.active { opacity: 1; pointer-events: auto; }
        #lightbox-img { max-width: 90%; max-height: 85vh; border-radius: 6px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.4s ease; }
        #lightbox-overlay.active #lightbox-img { transform: scale(1); }
        .lightbox-hint { position: absolute; bottom: 20px; color: #ccc; font-size: 0.8rem; }

        /* Kado Digital Style */
        .section-kado { background-color: #fff; padding: 35px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 50px; }
        .card-rekening { background-color: #f7f5f0; border: 1px dashed #d4af37; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: center; }

        /* Form RSVP Style */
        .section-rsvp { background-color: #fff; padding: 35px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: left; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #555; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #eadecc; border-radius: 8px; font-family: inherit; font-size: 0.9rem; background-color: #fbfbfa; }
        .btn-submit { background-color: #d4af37; color: #fff; border: none; width: 100%; padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background-color: #aa8c2c; }
        #form-status { margin-top: 15px; font-size: 0.9rem; text-align: center; font-weight: 600; }

        #music-control { position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; background-color: rgba(212, 175, 55, 0.9); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 999; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); animation: putarMusik 4s linear infinite; animation-play-state: paused; }
        @keyframes putarMusik { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <audio id="bg-music" src="musik-pernikahan.mp3" loop></audio>
    <div id="music-control" onclick="toggleMusik()">🎵</div>
    <div id="lightbox-overlay" onclick="tutupFoto()"><img id="lightbox-img" src="" alt="Foto"><p class="lightbox-hint">Ketuk untuk menutup</p></div>

    <div id="cover">
        <p style="letter-spacing: 3px; font-size: 0.9rem;">THE WEDDING OF</p>
        <h1 class="wedding-title">Ardy & Ana</h1>
        <div class="guest-box">
            <p style="font-size: 0.9rem; font-style: italic;">Kepada Yth. Bapak/Ibu/Saudara/i:</p>
            <h2 id="nama-tamu" class="guest-name">Tamu Undangan</h2>
        </div>
        <button class="btn-open" onclick="bukaUndangan()">Buka Undangan</button>
    </div>

    <div id="main-content">
        <section class="section-salam">
            <p class="salam-arab">Om Swastyastu</p>
            <p class="salam-teks">Atas Asung Kertha Wara Nugraha, kami mengundang Bapak/Ibu/Saudara/i untuk menghadiri Acara Pernikahan kami.</p>
        </section>

        <section class="section-rsvp">
            <h3 style="font-family: 'Great Vibes', cursive; font-size: 2.5rem; text-align: center; color: #aa8c2c; margin-bottom: 5px;">Konfirmasi Kehadiran</h3>
            <form id="rsvp-form" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="MASUKKAN_ACCESS_KEY_ANDA_DISINI">
                <div class="form-group">
                    <label>Nama Tamu</label>
                    <input type="text" name="Nama Tamu" id="form-nama-tamu" class="form-control" required readonly>
                </div>
                <div class="form-group">
                    <label>Konfirmasi Kehadiran</label>
                    <select name="Konfirmasi Kehadiran" class="form-control" required>
                        <option value="Hadir">Hadir</option>
                        <option value="Tidak Hadir">Tidak Hadir</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Kirim Konfirmasi</button>
                <div id="form-status"></div>
            </form>

            <div style="text-align: center; margin: 30px 0;">
                <a href="https://docs.google.com/spreadsheets/d/1GQnNhjb2Bb7oZDsktD9_Y7aeBjHUpCjlJqQwMSYegCM/edit?usp=sharing" target="_blank" style="text-decoration: none; background-color: #25d366; color: white; padding: 12px 25px; border-radius: 25px; font-weight: bold;">Lihat Daftar Tamu</a>
            </div>
        </section>
    </div>

    <script>
        function bukaUndangan() {
            document.getElementById('cover').classList.add('opened');
            document.getElementById('bg-music').play();
            document.getElementById('music-control').style.animationPlayState = 'running';
        }
        function getGuestName() {
            const urlParams = new URLSearchParams(window.location.search);
            const guestName = urlParams.get('to');
            const name = guestName ? decodeURIComponent(guestName) : "Tamu Undangan";
            document.getElementById('nama-tamu').innerText = name;
            document.getElementById('form-nama-tamu').value = name;
        }
        window.onload = getGuestName;
        // (Fungsi lainnya tetap sama)
    </script>
</body>
</html>
