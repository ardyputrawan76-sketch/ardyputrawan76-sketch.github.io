<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Resmi Pak Ardy</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            text-align: center;
            padding: 60px 20px;
            margin: 0;
            
            /* 👇 PENGATURAN BACKGROUND ADAPTIF (ANTI-GEPENG) 👇 */
            background-image: url('dhome.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
        }
        
        /* 👇 KOTAK EFEK KACA BURAM ELEGAN (IPHONE STYLE) 👇 */
        .container {
            max-width: 500px;
            background: rgba(255, 255, 255, 0.15); /* Putih transparan tipis */
            padding: 30px;
            border-radius: 24px; /* Sudut melengkung halus khas iOS */
            border: 1px solid rgba(255, 255, 255, 0.25); /* Garis tepi kaca tipis */
            
            /* Mantra Sakti untuk Efek Blur Kaca */
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin: 50px auto 0 auto;
        }
                h1 {
            font-size: clamp(1.6rem, 5.5vw, 2.5rem); /* Huruf otomatis mengecil di HP */
            margin-bottom: 5px;
            font-weight: 700;
            white-space: nowrap;                     /* Mantra pengunci: Tulisan dilarang turun ke bawah */
        }

    
        p {
            font-size: 1.05rem;
            opacity: 0.9;
            line-height: 1.6;
        }
        .btn-wadah {
            margin-top: 25px;
        }
        .btn {
            display: block;
            background: rgba(255, 255, 255, 0.9); /* Tombol putih bersih khas iOS */
            color: #1e3c72;
            padding: 14px;
            margin: 12px 0;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover {
            background: white;
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ardy Putrawan, S.Pd. 👋</h1>
        <p style="color: #00c6ff; font-weight: 600; margin-top: 0;">Guru PJOK</p>
        <hr style="border: 0.5px solid rgba(255,255,255,0.2); margin: 20px 0;">
        <p>Selamat datang di ruang digital saya. Website ini digunakan untuk membagikan materi pembelajaran, rekap nilai, dan informasi seputar olahraga siswa.</p>
        
        <div class="btn-wadah">
            <a href="#" class="btn">📚 Materi Pembelajaran</a>
            <a href="#" class="btn">📊 Cek Nilai Siswa</a>
        </div>
    </div>

</body>
</html>
